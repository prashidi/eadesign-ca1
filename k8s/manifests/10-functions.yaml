apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing-fn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pricing-fn
  template:
    metadata:
      labels:
        app: pricing-fn
    spec:
      containers:
        - name: pricing-fn
          image: ead/pricing-fn:v3
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: DELAY_MS
              value: "0"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pricing-svc
spec:
  selector:
    app: pricing-fn
  ports:
    - name: http
      port: 80
      targetPort: 3001
---
apiVersion: apps/v1
