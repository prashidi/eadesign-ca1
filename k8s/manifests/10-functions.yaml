---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-fn
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-fn
  template:
    metadata:
      labels:
        app: checkout-fn
    spec:
      containers:
        - name: checkout-fn
          image: ead/checkout-fn:v5
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          env:
            - name: PORT
              value: "3003"
            - name: PRICING_URL
              value: "http://pricing-svc"
            - name: INVENTORY_URL
              value: "http://inventory-svc"
            - name: TIMEOUT_MS
              value: "1500"
            - name: DB_HOST
              value: "postgres-svc"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "checkoutdb"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-creds
                  key: password
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-svc
spec:
  selector:
    app: checkout-fn
  ports:
    - name: http
      port: 80
      targetPort: 3003
